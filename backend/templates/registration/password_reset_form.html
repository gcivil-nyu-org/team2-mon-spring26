{% extends 'base.html' %}

{% block title %}Password reset{% endblock %}

{% block content %}
  <h2>Password reset</h2>
  <p>Enter your email address and we'll send reset instructions.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send reset email</button>
  </form>
{% endblock %}
