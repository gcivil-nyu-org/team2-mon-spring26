language: python
python:
  - '3.14'
dist: noble # Use Ubuntu 24.04 'Noble' for best 3.14 support

# Force Travis to provide Node 20 for Vite compatibility
node_js:
  - '20'

install:
  # Ensure the environment uses Node 20 immediately
  - nvm install 20
  - nvm use 20
  # Install Python tools
  - pip install black flake8 coverage coveralls
  # Install project dependencies
  - (cd backend && pip install -r requirements.txt)
  - (cd frontend && npm ci)

before_script:
  - (cd backend && python manage.py migrate)

script:
  # 1. Quality Checks
  # Using --config=.flake8 ensures it ignores those E501 long lines
  - black --check backend/
  - flake8 backend/ --config=.flake8
  - (cd frontend && npm run lint)

  # 2. Backend Tests & Coverage
  - (cd backend && coverage run --rcfile=../.coveragerc --source=. manage.py test)

  # 3. Frontend Build
  - (cd frontend && npm run build)

after_success:
  - (cd backend && coveralls)

before_deploy:
  # Package only the backend directory for backend EB deploy
  - (cd backend && zip -r ../backend-deploy.zip . --exclude "*.pyc" --exclude "*/__pycache__/*" --exclude ".venv/*" --exclude "db.sqlite3" --exclude "db.sqlite3.bak" --exclude ".env" --exclude ".DS_Store" --exclude ".elasticbeanstalk/*" --exclude "aws-elastic-beanstalk-cli-setup/*")
  # Package the pre-built frontend dist/, Procfile, package.json, lockfile, and .platform/ Nginx config
  - (cd frontend && zip -r ../frontend-deploy.zip dist/ Procfile package.json package-lock.json .platform/)

deploy:
  - provider: elasticbeanstalk
    access_key_id: $AWS_ACCESS_KEY_ID
    secret_access_key: $AWS_SECRET_ACCESS_KEY
    region: 'us-east-1'
    app: 'mealswipe-backend'
    env: 'mealswipe-backend-env'
    bucket_name: 'elasticbeanstalk-us-east-1-916055948433'
    zip_file: backend-deploy.zip
    edge: true
    on:
      branch: develop

  - provider: elasticbeanstalk
    access_key_id: $AWS_ACCESS_KEY_ID
    secret_access_key: $AWS_SECRET_ACCESS_KEY
    region: 'us-east-1'
    app: 'mealswipe-frontend'
    env: 'Mealswipe-frontend-env'
    bucket_name: 'elasticbeanstalk-us-east-1-916055948433'
    zip_file: frontend-deploy.zip
    edge: true
    on:
      branch: develop
